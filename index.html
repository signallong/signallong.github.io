<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binance Chart Analiz Motoru</title>
    <!-- Plotly via CDN -->
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar Controls -->
        <aside class="sidebar glass-panel">
            <h2>📊 Chart Analyzer</h2>
            
            <div class="input-group">
                <label>Symbol</label>
                <input type="text" id="symbolInput" value="GMT" placeholder="Coin (örn: GMT, BTC)">
            </div>
            
            <div class="input-group">
                <label>Timeframe</label>
                <select id="tfSelect">
                    <option value="5m">5m</option>
                    <option value="15m">15m</option>
                    <option value="30m">30m</option>
                    <option value="1h" selected>1h</option>
                    <option value="4h">4h</option>
                    <option value="1d">1d</option>
                </select>
            </div>
            
            <button id="calcBtn" class="primary-btn">Analiz Et 🚀</button>

            <!-- Summary Results -->
            <div class="summary-card" id="summaryCard">
                <h3>Güncel Durum</h3>
                <div id="loadingStatus" class="hidden" style="color:var(--accent);font-size:0.85rem;">🔄 Veriler çekiliyor...</div>
                
                <div class="stat-row"><span>Fiyat:</span> <strong id="valPrice">-</strong></div>
                <div class="stat-row"><span>Değişim:</span> <strong id="valChange">-</strong></div>
                <div class="stat-row"><span>RSI (14):</span> <strong id="valRsi">-</strong></div>
                <div class="stat-row"><span>EMA 20:</span> <strong id="valEma20">-</strong></div>
                <div class="stat-row"><span>EMA 50:</span> <strong id="valEma50">-</strong></div>
                <div class="stat-row"><span>Trend:</span> <strong id="valTrend">-</strong></div>
                
                <div class="patterns-section">
                    <h4>🔍 Tespit Edilen Formasyonlar</h4>
                    <div id="patternsList">
                        <div class="no-pattern" style="font-size:0.85rem;color:var(--text-secondary);">Henüz analiz yapılmadı.</div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Chart Container -->
        <main class="chart-area glass-panel">
            <div id="plotlyChart" class="chart-container"></div>
        </main>
    </div>

    <script src="math.js"></script>
    <script src="patterns.js"></script>
    <script src="app.js"></script>
</body>
</html>
