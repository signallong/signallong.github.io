<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binance Analyzer</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f4f4f4;
            padding: 20px;
        }
        canvas {
            max-width: 600px;
            width: 100%;
        }
    </style>
</head>
<body>

<h1>Binance Chart Analysis Tool</h1>
<canvas id="binanceChart"></canvas>
<script>
    const ctx = document.getElementById('binanceChart').getContext('2d');
    let binanceChart;

    async function fetchData() {
        try {
            const response = await fetch('https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1m');
            const data = await response.json();
            const prices = data.map(item => ({
                time: new Date(item[0]).toISOString(),
                open: parseFloat(item[1]),
                high: parseFloat(item[2]),
                low: parseFloat(item[3]),
                close: parseFloat(item[4])
            }));

            updateChart(prices);
        } catch (error) {
            console.error('Error fetching data from Binance:', error);
        }
    }

    function updateChart(prices) {
        const labels = prices.map(item => item.time);
        const data = {
            labels: labels,
            datasets: [{
                label: 'BTC/USDT',
                borderColor: 'rgba(75, 192, 192, 1)',
                borderWidth: 1,
                data: prices.map(item => item.close),
            }]
        };

        if (binanceChart) {
            binanceChart.destroy();
        }

        binanceChart = new Chart(ctx, {
            type: 'line',
            data: data,
            options: {
                scales: {
                    x: {
                        type: 'time',
                        time: {
                            unit: 'minute'
                        }
                    },
                    y: {
                        beginAtZero: false
                    }
                }
            }
        });
    }

    fetchData();
    setInterval(fetchData, 60000);
</script>
</body>
</html>
