<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binance Chart Analysis Tool</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://api.binance.com/api/v3/klines"></script>
</head>
<body>
    <h1>Binance Chart Analysis Tool</h1>
    <canvas id="myChart" width="400" height="200"></canvas>
    <script>
        const ctx = document.getElementById('myChart').getContext('2d');
        const fetchData = async () => {
            const response = await fetch('https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1h');
            const data = await response.json();
            const labels = data.map(point => new Date(point[0]).toLocaleString());
            const prices = data.map(point => point[4]);

            return { labels, prices };
        };

        const createChart = async () => {
            const { labels, prices } = await fetchData();
            const myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'BTC/USDT',
                        data: prices,
                        borderColor: 'rgba(75, 192, 192, 1)',
                        fill: false
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        x: { type: 'time' },
                        y: { beginAtZero: true }
                    }
                }
            });
        };

        createChart();
    </script>
</body>
</html>
